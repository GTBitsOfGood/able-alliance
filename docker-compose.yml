services:
  app:
    container_name: able-alliance-app
    build:
      context: .
      dockerfile: ./Dockerfile.dev
    environment:
      MONGODB_URI: "mongodb://mongo:27017/able-alliance?replicaSet=rs0"
      NEXTAUTH_SECRET: "dev-secret-change-in-production"
      DEPLOY_PRIME_URL: "http://localhost:3000"
      CAS_BASE_URL: "http://cas:8443/cas"
      CAS_BASE_URL_BROWSER: "http://localhost:8443/cas"
      SUPERADMIN_EMAIL: "superadmin@gatech.edu"
      SUPERADMIN_FIRSTNAME: "Super"
      SUPERADMIN_LASTNAME: "Admin"
      NEXT_PUBLIC_WEBSOCKET_URL: "http://localhost:4000"
      WATCHPACK_POLLING: "true"
      NEXT_PUBLIC_WS_URL: "http://localhost:4000"
    develop:
      watch:
        - action: rebuild
          path: package.json
        - action: rebuild
          path: package-lock.json
        - action: rebuild
          path: Dockerfile.dev
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./public:/app/public
      - ./.env:/app/.env
      - ./next.config.ts:/app/next.config.ts
      - ./tsconfig.json:/app/tsconfig.json
      - ./postcss.config.mjs:/app/postcss.config.mjs
      - ./app-init.sh:/app/app-init.sh
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    ports:
      - "3000:3000"
    networks:
      - able-alliance-net
    depends_on:
      mongo:
        condition: service_healthy
      cas:
        condition: service_started
    entrypoint: ["/bin/bash", "./app-init.sh"]

  express:
    container_name: able-alliance-express
    build:
      context: .
      dockerfile: ./Dockerfile.dev
    environment:
      PORT: "3001"
      MONGODB_URI: "mongodb://mongo:27017/able-alliance?replicaSet=rs0"
    develop:
      watch:
        - action: sync
          path: ./websocket-server
          target: /app/websocket-server
        - action: rebuild
          path: package.json
        - action: rebuild
          path: package-lock.json
        - action: rebuild
          path: Dockerfile.dev
    volumes:
      - ./:/app
      - express_node_modules:/app/node_modules
    ports:
      - "3001:3001"
    networks:
      - able-alliance-net
    depends_on:
      mongo:
        condition: service_healthy
    command: ["npm", "run", "dev:server"]

  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    networks:
      - able-alliance-net
    entrypoint: ["/bin/bash", "/app/mongo-init.sh"]
    volumes:
      - mongodb-data:/data/db
      - ./mongo-init.sh:/app/mongo-init.sh
    logging:
      driver: "none"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "rs.status().ok", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  cas:
    container_name: mock-cas-server
    build:
      context: ./mock-cas-server
      dockerfile: Dockerfile
    environment:
      PORT: "8443"
      SUPERADMIN_EMAIL: "superadmin@gatech.edu"
      SUPERADMIN_FIRSTNAME: "Super"
      SUPERADMIN_LASTNAME: "Admin"
    ports:
      - "8443:8443"
    networks:
      - able-alliance-net

  websocket:
    build:
      context: .
      dockerfile: websocket-server/Dockerfile
    container_name: able-alliance-websocket
    ports:
      - "4000:4000"
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      - MONGODB_URI=mongodb://mongo:27017/able-alliance?replicaSet=rs0
      - NEXTAUTH_SECRET=dev-secret-change-in-production
    networks:
      - able-alliance-net

networks:
  able-alliance-net:
    driver: bridge

volumes:
  mongodb-data:
  node_modules:
  express_node_modules:
  next_cache:
